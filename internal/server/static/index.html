<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Homedex</title>
<style>body{margin:0;background:#0d1017;color:#e7e9ee;font:14px system-ui,sans-serif}.shell{max-width:960px;margin:80px auto;padding:32px}.brand{color:#f5a524;letter-spacing:.08em;text-transform:uppercase;font-size:12px}h1{font-size:42px;margin:.4em 0}.card{margin-top:32px;padding:24px;background:#151a24;border:1px solid #293142;border-radius:8px}.status{color:#3ddc97}code{color:#f5a524}</style></head>
<body><main class="shell"><div class="brand">Homedex v0.1 foundation</div><h1>Your homelab’s living ledger.</h1><p>One read-only process. No agents. No telemetry. Your data stays here.</p><section class="card"><strong>System status</strong><p id="status">Checking API…</p><small>The full Svelte inventory interface is being built separately. The API and storage foundation are ready.</small></section></main><script>fetch('/api/health').then(r=>r.json()).then(x=>{const el=document.querySelector('#status');el.className='status';el.textContent=x.status+' · SQLite connected'}).catch(()=>document.querySelector('#status').textContent='API unavailable')</script></body></html>
